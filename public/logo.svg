<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Luxury Light Background -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDF2F8"/>
      <stop offset="50%" stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>

    <!-- Glass Bubble -->
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.75)"/>
    </linearGradient>

    <!-- Gold Accent -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="30" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Rounded Background -->
  <rect width="512" height="512" rx="140" fill="url(#bgGradient)"/>

  <!-- BIGGER Glass Speech Bubble -->
  <g filter="url(#shadow)">
    <rect x="110" y="120" width="300" height="240" rx="80" fill="url(#glass)"/>
    <polygon points="210,360 300,330 260,420" fill="url(#glass)"/>
  </g>

  <!-- Bigger Elegant Waves -->
  <circle cx="250" cy="240" r="22" fill="url(#gold)"/>
  <path d="M290 195 Q370 240 290 285" stroke="url(#gold)" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M330 165 Q430 240 330 315" stroke="url(#gold)" stroke-width="12" fill="none" stroke-linecap="round"/>

</svg>